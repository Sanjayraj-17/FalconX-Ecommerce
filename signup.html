<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — FalconX</title>
  
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <!-- Loading Screen -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loader"></div>
  </div>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="nav-container" style="justify-content: center;">
      <a href="index.html" class="nav-logo" style="display: flex; align-items: center; gap: 8px;">
        <img src="images/logo.jpg" alt="FalconX Logo" class="logo-img" style="height: 32px; width: 32px; object-fit: cover; border-radius: 6px;">
        <span class="logo-text"><span>FalconX</span></span>
      </a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      
      <div class="auth-header">
        <span class="auth-logo">✨</span>
        <h1 class="auth-title">Create an Account</h1>
        <p class="auth-subtitle">Join FalconX to start shopping!</p>
      </div>

      <!-- Signup Form -->
      <form id="signupForm" novalidate>
        
        <!-- Full Name -->
        <div class="form-group">
          <label class="form-label" for="signupName">Full Name</label>
          <input type="text" id="signupName" class="form-input" placeholder="Enter your full name" required>
          <div class="form-error" id="nameError">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            <span>Please enter your name.</span>
          </div>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="signupEmail">Email Address</label>
          <input type="email" id="signupEmail" class="form-input" placeholder="Enter your email" required>
          <div class="form-error" id="emailError">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            <span>Please enter a valid email.</span>
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="signupPassword">Password</label>
          <div class="password-wrapper">
            <input type="password" id="signupPassword" class="form-input" placeholder="Create a password (min 6 chars)" required>
            <button type="button" class="password-toggle" id="toggleSignupPassword" aria-label="Toggle password visibility">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
          
          <!-- Password Strength Indicator -->
          <div class="password-strength">
            <div class="strength-bar">
              <div class="strength-fill" id="strengthFill"></div>
            </div>
            <div class="strength-text" id="strengthText">Password strength</div>
          </div>

          <div class="form-error" id="passwordError">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            <span>Password must be at least 6 characters.</span>
          </div>
        </div>

        <button type="submit" class="auth-btn" id="signupBtn">Create Account</button>

      </form>

      <div class="auth-switch">
        Already have an account? <a href="login.html">Sign In</a>
      </div>

    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/global.js"></script>
  <script src="js/signup.js"></script>
</body>
</html>
