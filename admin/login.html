<!DOCTYPE html>
<!--
  ADMIN LOGIN PAGE
  ================
  This is a separate login page for store administrators.
  Default credentials: admin@shopverse.com / admin123
  
  Once logged in, redirects to the admin dashboard.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — FalconX</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <div class="admin-login-page">
    <div class="admin-login-card">
      <div class="login-logo" style="margin-bottom: 20px;">
        <img src="../images/logo.jpg" alt="FalconX Logo" style="height: 60px; width: 60px; object-fit: cover; border-radius: 12px; margin: 0 auto; display: block;">
      </div>
      <h1>Admin Panel</h1>
      <p class="login-subtitle">Sign in to manage your FalconX store</p>

      <div class="form-group-admin">
        <label for="adminEmail">Email</label>
        <input type="email" id="adminEmail" placeholder="admin@shopverse.com">
      </div>

      <div class="form-group-admin">
        <label for="adminPassword">Password</label>
        <input type="password" id="adminPassword" placeholder="••••••••">
      </div>

      <button class="btn-admin btn-admin-primary" id="adminLoginBtn">
        Sign In to Dashboard
      </button>

      <div class="login-hint">
        <strong>Demo Credentials:</strong><br>
        Email: <code>admin@falconx.com</code><br>
        Password: <code>admin123</code>
      </div>
    </div>
  </div>

  <div class="admin-toast-container" id="adminToastContainer"></div>

  <script>
    /* ---- Admin Login Logic ---- */
    const ADMIN_EMAIL = 'admin@falconx.com';
    const ADMIN_PASS = 'admin123';

    document.getElementById('adminLoginBtn').addEventListener('click', function () {
      const email = document.getElementById('adminEmail').value.trim();
      const pass = document.getElementById('adminPassword').value.trim();

      if (!email || !pass) {
        showAdminToast('Please fill in all fields', 'error');
        return;
      }

      if (email === ADMIN_EMAIL && pass === ADMIN_PASS) {
        localStorage.setItem('shopverse_admin', JSON.stringify({ email: email, loggedIn: true }));
        showAdminToast('Login successful! Redirecting...', 'success');
        setTimeout(function () { window.location.href = 'index.html'; }, 1000);
      } else {
        showAdminToast('Invalid credentials', 'error');
      }
    });

    // Allow Enter key to submit
    document.getElementById('adminPassword').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') document.getElementById('adminLoginBtn').click();
    });

    function showAdminToast(msg, type) {
      const container = document.getElementById('adminToastContainer');
      const toast = document.createElement('div');
      toast.className = 'admin-toast ' + type;
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(function () {
        toast.classList.add('removing');
        setTimeout(function () { toast.remove(); }, 300);
      }, 2500);
    }
  </script>

</body>
</html>
