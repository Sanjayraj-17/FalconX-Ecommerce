<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — FalconX</title>
  
  <!-- CSS Files -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <!-- Loading Screen -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loader"></div>
  </div>

  <!-- Navbar (Simplified for Auth pages) -->
  <nav class="navbar" id="navbar">
    <div class="nav-container" style="justify-content: center;">
      <a href="index.html" class="nav-logo" style="display: flex; align-items: center; gap: 8px;">
        <img src="images/logo.jpg" alt="FalconX Logo" class="logo-img" style="height: 32px; width: 32px; object-fit: cover; border-radius: 6px;">
        <span class="logo-text"><span>FalconX</span></span>
      </a>
    </div>
  </nav>

  <!-- Auth Page Layout -->
  <div class="auth-page">
    <div class="auth-card">
      
      <div class="auth-header">
        <span class="auth-logo">👋</span>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Please enter your details to sign in.</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm" novalidate>
        
        <!-- Email Field -->
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" class="form-input" placeholder="Enter your email" required>
          <div class="form-error" id="emailError">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            <span>Please enter a valid email.</span>
          </div>
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <div class="password-wrapper">
            <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required>
            <button type="button" class="password-toggle" id="toggleLoginPassword" aria-label="Toggle password visibility">
              <!-- Eye Icon -->
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
          <div class="form-error" id="passwordError">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            <span>Incorrect password.</span>
          </div>
        </div>

        <!-- Options Row -->
        <div class="form-options">
          <label class="form-checkbox">
            <input type="checkbox" id="rememberMe">
            Remember me
          </label>
          <a href="forgot-password.html" class="form-link">Forgot password?</a>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="auth-btn" id="loginBtn">Sign In</button>

      </form>

      <!-- Switch to Signup -->
      <div class="auth-switch">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </div>

    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- JS Files -->
  <script src="js/global.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
